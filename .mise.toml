[env]
_.file = [
  ".secret",
  "config/cnpg/env"
]
KUBECONFIG = "{{config_root}}/k3s.kubeconfig"

[plugins]
krew = "https://github.com/soupglasses/mise-krew"

[tools]
"github:mitsuhiko/minijinja" = "2.20.0"
opentofu = "1.12.3"
kubectl = "1.36.2"
helm = "4.2.2"
"aqua:gitleaks/gitleaks" = "8.30.1"
"aqua:google/yamlfmt" = "0.21.0"
scaleway-cli = "2.57.0"
awscli = "2.35.9"
"krew:cnpg" = "1.29.1"
kubectx = "0.11.0"
kubens = "0.11.0"
helmfile = "1.5.5"
"krew:stern" = "1.34.0"
k9s = "0.51.0"

[hooks.enter]
shell = "zsh"
script = "source <(kubectl completion zsh)"

[tasks.setup-git-hooks]
description = "Configure git hooks path for gitleaks"
run = "scripts/setup-git-hooks.sh"

[tasks.setup-jj-alias]
description = "Configure jj publish alias for gitleaks"
run = "scripts/setup-jj-alias.sh"

[tasks.gitleaks-check-push]
description = "Run gitleaks on the whole project (pre-push check)"
run = "scripts/gitleaks-check-push.sh"

[tasks.gitleaks-scan]
description = "Run gitleaks on the full project directory"
run = "gitleaks dir --no-banner -v {{config_root}}"

[tasks.generate-k3s-token]
description = "Generate K3S_TOKEN and append it to .secret"
run = "scripts/generate-k3s-token.sh"

[tasks.k3s-health]
description = "Check k3s cluster health (nodes, pods, events, resources)"
run = "scripts/k3s-health.sh"

[tasks.setup-secret]
description = "Generate .secret from scripts/generate-secret.sh via gopass"
run = "scripts/generate-secret.sh > .secret"

[tasks.deploy-traefik]
description = "Deploy Traefik ingress controller + cert-manager with CA"
run = "scripts/deploy-traefik.sh"

[tasks.destroy-traefik]
description = "Destroy Traefik ingress controller + cert-manager"
run = "scripts/destroy-traefik.sh"

[tasks.disable-servicelb]
description = "Disable k3s ServiceLB (SSH + restart k3s)"
run = "scripts/disable-servicelb.sh"

[tasks.deploy-victoria-metrics]
description = "Deploy VictoriaMetrics at https://metrics.sklein.internal"
run = "scripts/deploy-victoria-metrics.sh"

[tasks.destroy-victoria-metrics]
description = "Destroy VictoriaMetrics"
run = "scripts/destroy-victoria-metrics.sh"

[tasks.deploy-perses]
description = "Deploy Perses at https://perses.sklein.internal"
run = "scripts/deploy-perses.sh"

[tasks.destroy-perses]
description = "Destroy Perses"
run = "scripts/destroy-perses.sh"

[tasks.pull-perses-dashboards]
description = "Pull dashboards from Perses API to perses/dashboards/"
run = "scripts/pull-perses-dashboards.sh"

[tasks.push-perses-dashboards]
description = "Push dashboards from perses/dashboards/ to cluster"
run = "scripts/push-perses-dashboards.sh"

[tasks.deploy-authelia]
description = "Deploy Authelia at https://auth.sklein.internal"
run = "scripts/deploy-authelia.sh"

[tasks.destroy-authelia]
description = "Destroy Authelia"
run = "scripts/destroy-authelia.sh"

[tasks.add-authelia-user]
description = "Add or update a user in Authelia"
run = "scripts/add-authelia-user.sh"

[tasks.push-authelia-config]
description = "Push config/authelia/users.yml to the authelia-users ConfigMap"
run = "scripts/push-authelia-config.sh"

[tasks.deploy-cnpg]
description = "Deploy CloudNativePG operator on nuc-i7-gen11"
run = "scripts/deploy-cnpg.sh"

[tasks.destroy-cnpg]
description = "Destroy CloudNativePG operator"
run = "scripts/destroy-cnpg.sh"

[tasks.deploy-cnpg-memex]
description = "Deploy CNPG cluster Memex via helmfile"
run = "scripts/deploy-cnpg-memex.sh"

[tasks.destroy-cnpg-memex]
description = "Destroy CNPG cluster Memex"
run = "scripts/destroy-cnpg-memex.sh"

[tasks.list-cnpg-memex-backups]
description = "List CNPG Memex backups"
run = "scripts/list-cnpg-memex-backups.sh"

[tasks.backup-cnpg-memex]
description = "Trigger immediate CNPG Memex backup"
run = "scripts/backup-cnpg-memex.sh"

[tasks.delete-cnpg-memex-backup]
description = "Delete a CNPG Memex backup by name"
run = "scripts/delete-cnpg-memex-backup.sh"

[tasks.deploy-homepage]
description = "Deploy Homepage at https://homepage.sklein.internal"
run = "scripts/deploy-homepage.sh"

[tasks.destroy-homepage]
description = "Destroy Homepage"
run = "scripts/destroy-homepage.sh"

[tasks.deploy-exporters]
description = "Deploy kube-state-metrics, node-exporter, vmagent"
run = "scripts/deploy-exporters.sh"

[tasks.destroy-exporters]
description = "Destroy exporters"
run = "scripts/destroy-exporters.sh"

[tasks.test-cnpg-backups]
description = "Test CNPG backups bucket access (requires CNPG_BACKUPS_* in .secret)"
run = "scripts/test-cnpg-backups.sh"

[tasks.test-scaleway-auth]
description = "Test that Scaleway API credentials are valid"
run = "scw object bucket list 1>/dev/null 2>&1 && echo 'ok'"

[tasks.deploy-external-secrets]
description = "Deploy external-secrets operator"
run = "scripts/deploy-external-secrets.sh"

[tasks.deploy-toggl-pg-mirror]
description = "Deploy toggl-pg-mirror (syncs Toggl time entries to PostgreSQL)"
run = "scripts/deploy-toggl-pg-mirror.sh"


