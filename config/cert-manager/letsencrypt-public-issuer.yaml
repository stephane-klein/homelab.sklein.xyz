apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-public
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: contact@stephane-klein.info
    privateKeySecretRef:
      name: letsencrypt-public-account-key
    solvers:
      - dns01:
          cloudflare:
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api-token
