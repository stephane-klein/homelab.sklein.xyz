apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hindsight-api
  namespace: hindsight
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`api.hindsight.sklein.internal`)
      kind: Rule
      services:
        - name: hindsight-api
          port: 8888
  tls:
    secretName: hindsight-api-tls
