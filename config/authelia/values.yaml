configMap:
  server:
    port: 9091
  log:
    level: info
  authentication_backend:
    file:
      enabled: true
      path: /config/users.yml
      watch: true
      password:
        algorithm: argon2
        argon2:
          variant: argon2id
          iterations: 3
          memory: 65536
          parallelism: 4
          key_length: 32
          salt_length: 16
  access_control:
    default_policy: deny
    rules:
      - domain: auth.sklein.internal
        policy: one_factor
      - domain: "*.sklein.internal"
        policy: one_factor
  session:
    name: authelia_session
    same_site: lax
    cookies:
      - subdomain: auth
        domain: sklein.internal
  regulation:
    max_retries: 3
    find_time: 2m
    ban_time: 5m
  storage:
    local:
      enabled: true
      path: /config/db.sqlite3
  notifier:
    disable_startup_check: true
    filesystem:
      enabled: true
      filename: /config/notification.txt

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: homelab-ca
  tls:
    enabled: true
    secret: authelia-tls

persistence:
  enabled: true
  size: 1Gi

pod:
  kind: Deployment
  replicas: 1
  extraVolumes:
    - name: users
      configMap:
        name: authelia-users
  extraVolumeMounts:
    - name: users
      mountPath: /config/users.yml
      subPath: users.yml
