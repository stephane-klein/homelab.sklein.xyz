[extend]
useDefault = true

[[rules]]
id = "generic-api-key"
entropy = 2

[[allowlists]]
description = "Allow .jj internal files (local-only, never committed)"
paths = [
    "\\.jj/"
]

[[allowlists]]
description = "Allow .secret files"
paths = [
    "\\.secret$"
]

[[allowlists]]
description = "Allow certs directory"
paths = [
    "certs/"
]

[[allowlists]]
description = "Allow Terraform state files"
paths = [
    ".*\\.tfstate"
]

[[allowlists]]
description = "Allow known safe scripts (generic-api-key false positives)"
paths = [
    "scripts/deploy-authelia-demo.sh"
]
[[allowlists.rules]]
id = "generic-api-key"

[[allowlists]]
description = "Allow gitignored kubeconfig (local-only, never committed)"
paths = [
    "k3s.kubeconfig"
]
