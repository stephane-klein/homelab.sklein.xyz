                  seriesNameFormat: Load 1m
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: node_load5{instance="nuc-i3-gen5.homelab.stephane-klein.info",job="node-exporter"}
                  seriesNameFormat: Load 5m
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: node_load15{instance="nuc-i3-gen5.homelab.stephane-klein.info",job="node-exporter"}
                  seriesNameFormat: Load 15m
    '1_0':
      kind: Panel
      spec:
        display:
          name: "nuc-i7-gen11 — Memory"
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              mode: table
              position: bottom
              values:
                - last
            yAxis:
              format:
                shortValues: true
                unit: bytes
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: node_memory_MemTotal_bytes{instance="nuc-i7-gen11.homelab.stephane-klein.info",job="node-exporter"}
