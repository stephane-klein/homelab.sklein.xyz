                    name: prometheus-datasource
                  query: node_filesystem_size_bytes{instance="nuc-i7-gen11.homelab.stephane-klein.info",job="node-exporter",mountpoint="/var",fstype!="tmpfs"} - node_filesystem_avail_bytes{instance="nuc-i7-gen11.homelab.stephane-klein.info",job="node-exporter",mountpoint="/var",fstype!="tmpfs"}
