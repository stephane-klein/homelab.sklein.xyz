kind: Dashboard
metadata:
  name: node-overview
  createdAt: '2026-06-21T09:44:57.98652897Z'
  updatedAt: '2026-06-21T10:02:28.000300074Z'
  version: 35
  project: homelab
spec:
  display:
    name: Node Overview
  panels:
    '0_0':
      kind: Panel
      spec:
        display:
          name: "nuc-i7-gen11 — CPU Load"
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              mode: table
              position: bottom
              values:
                - last
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: node_load1{instance="nuc-i7-gen11.homelab.stephane-klein.info",job="node-exporter"}
                  seriesNameFormat: Load 1m
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: node_load5{instance="nuc-i7-gen11.homelab.stephane-klein.info",job="node-exporter"}
                  seriesNameFormat: Load 5m
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: node_load15{instance="nuc-i7-gen11.homelab.stephane-klein.info",job="node-exporter"}
                  seriesNameFormat: Load 15m
    '0_1':
      kind: Panel
      spec:
        display:
          name: "nuc-i3-gen5 — CPU Load"
        plugin:
          kind: TimeSeriesChart
          spec:
