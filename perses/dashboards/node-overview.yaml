              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: node_memory_MemAvailable_bytes{instance="nuc-i7-gen11.homelab.stephane-klein.info",job="node-exporter"}
