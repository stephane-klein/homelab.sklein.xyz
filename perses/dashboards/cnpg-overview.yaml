kind: Dashboard
metadata:
  name: cnpg-overview
  project: perses-dev
spec:
  display:
    name: CloudNativePG Cluster Overview
  duration: 1h
  variables:
    - kind: ListVariable
      spec:
        name: namespace
        allowAllValue: false
        allowMultiple: false
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: prometheus-datasource
            labelName: namespace
            matchers:
              - "cnpg_pg_database_size_bytes"
        display:
          name: Namespace
          hidden: false
    - kind: ListVariable
      spec:
        name: cluster
        allowAllValue: false
        allowMultiple: false
        plugin:
          kind: PrometheusLabelValuesVariable
          spec:
            datasource:
              kind: PrometheusDatasource
              name: prometheus-datasource
            labelName: cnpg_cluster
            matchers:
              - "cnpg_pg_database_size_bytes"
        display:
          name: Cluster
          hidden: false
  layouts:
    - kind: Grid
      spec:
        display:
          title: Health & Overview
        items:
          - content:
              $ref: '#/spec/panels/0_0'
            height: 8
            width: 8
            x: 0
            y: 0
          - content:
              $ref: '#/spec/panels/0_1'
            height: 8
            width: 8
            x: 8
            y: 0
          - content:
              $ref: '#/spec/panels/0_2'
            height: 8
            width: 8
            x: 16
            y: 0
          - content:
              $ref: '#/spec/panels/0_3'
            height: 8
            width: 8
            x: 0
            y: 8
    - kind: Grid
      spec:
        display:
          title: Activity & Backups
        items:
          - content:
              $ref: '#/spec/panels/1_0'
            height: 8
            width: 8
            x: 0
            y: 0
          - content:
              $ref: '#/spec/panels/1_1'
            height: 8
            width: 8
            x: 8
            y: 0
          - content:
              $ref: '#/spec/panels/1_2'
            height: 8
            width: 8
            x: 16
            y: 0
          - content:
              $ref: '#/spec/panels/1_3'
            height: 8
            width: 8
            x: 0
            y: 8
          - content:
              $ref: '#/spec/panels/1_4'
            height: 8
            width: 8
            x: 8
            y: 8
          - content:
              $ref: '#/spec/panels/1_5'
            height: 8
            width: 8
            x: 16
            y: 8
    - kind: Grid
      spec:
        display:
          title: WAL & Archive Status
        items:
          - content:
              $ref: '#/spec/panels/2_0'
            height: 8
            width: 12
            x: 0
            y: 0
          - content:
              $ref: '#/spec/panels/2_1'
            height: 8
            width: 12
            x: 12
            y: 0
          - content:
              $ref: '#/spec/panels/2_2'
            height: 8
            width: 12
            x: 0
            y: 8
          - content:
              $ref: '#/spec/panels/2_3'
            height: 8
            width: 12
            x: 12
            y: 8
  panels:
    "0_0":
      kind: Panel
      spec:
        display:
          name: PostgreSQL Version
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
              values:
                - last
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: cnpg_collector_postgres_version{namespace="$namespace", cnpg_cluster="$cluster"}
                  seriesNameFormat: "{{pod}} — {{full}}"
    "0_1":
      kind: Panel
      spec:
        display:
          name: Server Uptime
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
              values:
                - last
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: time() - cnpg_pg_postmaster_start_time{namespace="$namespace", cnpg_cluster="$cluster"}
                  seriesNameFormat: "{{pod}} uptime (s)"
    "0_2":
      kind: Panel
      spec:
        display:
          name: Max Transaction Duration
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
              values:
                - last
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: cnpg_backends_max_tx_duration_seconds{namespace="$namespace", cnpg_cluster="$cluster"}
                  seriesNameFormat: "{{pod}} — {{datname}}"
    "0_3":
      kind: Panel
      spec:
        display:
          name: Cache Hit Ratio
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
              values:
                - last
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: |-
                    sum(rate(cnpg_cache_hits{namespace="$namespace", cnpg_cluster="$cluster"}[5m]))
                    /
                    (sum(rate(cnpg_cache_hits{namespace="$namespace", cnpg_cluster="$cluster"}[5m]))
                    + sum(rate(cnpg_cache_miss{namespace="$namespace", cnpg_cluster="$cluster"}[5m])))
                  seriesNameFormat: "Cache hit ratio"
    "1_0":
      kind: Panel
      spec:
        display:
          name: Transactions
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: rate(cnpg_pg_stat_database_xact_commit{namespace="$namespace", cnpg_cluster="$cluster"}[5m])
                  seriesNameFormat: "Commit — {{datname}}"
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: rate(cnpg_pg_stat_database_xact_rollback{namespace="$namespace", cnpg_cluster="$cluster"}[5m])
                  seriesNameFormat: "Rollback — {{datname}}"
    "1_1":
      kind: Panel
      spec:
        display:
          name: Backends
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
              values:
                - last
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: cnpg_backends_total{namespace="$namespace", cnpg_cluster="$cluster"}
                  seriesNameFormat: "{{pod}} — {{type}}"
    "1_2":
      kind: Panel
      spec:
        display:
          name: Database Size
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
              values:
                - last
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: cnpg_pg_database_size_bytes{namespace="$namespace", cnpg_cluster="$cluster"}
                  seriesNameFormat: "{{pod}} — {{datname}}"
    "1_3":
      kind: Panel
      spec:
        display:
          name: WAL Bytes
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: rate(cnpg_collector_wal_bytes{namespace="$namespace", cnpg_cluster="$cluster"}[5m])
                  seriesNameFormat: "WAL rate — {{pod}}"
    "1_4":
      kind: Panel
      spec:
        display:
          name: WAL Files
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
              values:
                - last
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: cnpg_collector_pg_wal{namespace="$namespace", cnpg_cluster="$cluster"}
                  seriesNameFormat: "{{pod}}"
    "1_5":
      kind: Panel
      spec:
        display:
          name: WAL Archive Status
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: cnpg_collector_pg_wal_archive_status{namespace="$namespace", cnpg_cluster="$cluster"}
                  seriesNameFormat: "{{pod}} — {{status}}"
    "2_0":
      kind: Panel
      spec:
        display:
          name: Archiver Archived Count
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: rate(cnpg_pg_stat_archiver_archived_count{namespace="$namespace", cnpg_cluster="$cluster"}[5m])
                  seriesNameFormat: "Archived rate — {{pod}}"
    "2_1":
      kind: Panel
      spec:
        display:
          name: Archiver Failed Count
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: rate(cnpg_pg_stat_archiver_failed_count{namespace="$namespace", cnpg_cluster="$cluster"}[5m])
                  seriesNameFormat: "Failed rate — {{pod}}"
    "2_2":
      kind: Panel
      spec:
        display:
          name: Seconds Since Last Archival
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
              values:
                - last
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: cnpg_pg_stat_archiver_seconds_since_last_archival{namespace="$namespace", cnpg_cluster="$cluster"}
                  seriesNameFormat: "{{pod}}"
    "2_3":
      kind: Panel
      spec:
        display:
          name: Last Available Backup
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: bottom
              mode: table
              values:
                - last
        queries:
          - kind: TimeSeriesQuery
            spec:
              plugin:
                kind: PrometheusTimeSeriesQuery
                spec:
                  datasource:
                    kind: PrometheusDatasource
                    name: prometheus-datasource
                  query: cnpg_collector_last_available_backup_timestamp{namespace="$namespace", cnpg_cluster="$cluster"}
                  seriesNameFormat: "{{pod}}"
